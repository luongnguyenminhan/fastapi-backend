version: '3.8'

services:
  db:
    image: mysql:8.0
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - meetagent-network
    environment:
      - MYSQL_USER="admin"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    image: luongnguyenminhan/durian-saleman:backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - meetagent-network
    ports:
      - "8081:8000"
    depends_on:
      - db
      - redis
      - minio
      # - bot

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - meetagent-network
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  minio:
    image: minio/minio:latest
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - meetagent-network
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --address ':9000' --console-address ':9001'

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    networks:
      - meetagent-network
    ports:
      - "6333:6333"  # REST API port
      - "6334:6334"  # gRPC port
    volumes:
      - qdrant_data:/qdrant/storage

  adminer:
    image: adminer:latest
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - meetagent-network
    ports:
      - "8080:8080"
    depends_on:
      - db

networks:
  meetagent-network:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  qdrant_data: